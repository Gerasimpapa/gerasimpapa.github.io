<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerasim Projects</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #090b12;
      color: #f6f0e7;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    main {
      width: min(980px, 100%);
    }

    h1 {
      font-size: clamp(2.2rem, 5vw, 4.5rem);
      line-height: 1;
      letter-spacing: 0.04em;
      margin-bottom: 14px;
    }

    .subtitle {
      color: #c7d2df;
      font-size: 1.05rem;
      line-height: 1.6;
      max-width: 680px;
      margin-bottom: 32px;
    }

    .project-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
    }

    .project-card {
      min-height: 220px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      text-decoration: none;
      color: inherit;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      padding: 24px;
      background: #121827;
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .project-card:hover {
      transform: translateY(-4px);
      border-color: rgba(255, 255, 255, 0.55);
      background: #172034;
    }

    .project-card.antikythera {
      background: #21170e;
      border-color: rgba(194, 138, 63, 0.5);
    }

    .project-card.antikythera:hover {
      background: #2b1d10;
      border-color: rgba(214, 163, 86, 0.85);
    }

    .tag {
      width: fit-content;
      border: 1px solid currentColor;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #93c5fd;
    }

    .antikythera .tag {
      color: #d6a356;
    }

    h2 {
      font-size: 1.65rem;
      margin: 22px 0 10px;
    }

    p {
      color: #d5dde8;
      line-height: 1.55;
    }

    .antikythera p {
      color: #eadcc8;
    }

    .site-links {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 22px;
      font-size: 0.92rem;
    }

    .site-links a {
      color: #c7d2df;
      text-decoration: none;
      border-bottom: 1px solid rgba(199, 210, 223, 0.45);
    }

    .site-links a:hover {
      color: #ffffff;
      border-bottom-color: #ffffff;
    }
  </style>
</head>
<body>
  <main>
    <h1>Projects</h1>
    <p class="subtitle">Choose a project to open.</p>
    <div class="project-grid">
      <a class="project-card" href="tetrada/">
        <div>
          <span class="tag">Game</span>
          <h2>Tetrada</h2>
          <p>Classic, Mirror, Preview Lab, Autoplay, and Z-piece test versions.</p>
        </div>
      </a>

      <a class="project-card antikythera" href="antikythera/">
        <div>
          <span class="tag">Astronomy</span>
          <h2>Antikythera</h2>
          <p>Planetary ring display inspired by the Antikythera mechanism.</p>
        </div>
      </a>
    </div>
    <nav class="site-links" aria-label="Repository links">
      <a href="license.html">Dual License</a>
      <a href="GPL-3.0.txt">GPLv3</a>
      <a href="COMMERCIAL_LICENSE.md">Commercial Licensing</a>
      <a href="ROADMAP.md">Roadmap</a>
      <a href="CHANGELOG.md">Changelog</a>
    </nav>
  </main>
</body>
</html>
